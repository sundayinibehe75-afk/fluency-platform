# Alembic configuration for the Fluency Platform backend.
# The sqlalchemy.url is overridden at runtime by env.py using settings.database_url.

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os

# Placeholder — overridden in env.py from settings.database_url
sqlalchemy.url = postgresql+asyncpg://placeholder

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
